<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git 명령어 실행기 - TaskFlow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-size: 13px;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-execute {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-execute:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-copy {
            background: #f0f0f0;
            color: #333;
        }

        .btn-copy:hover {
            background: #e0e0e0;
        }

        .commands-display {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .commands-display h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .command-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 4px solid #667eea;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #333;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.2s;
        }

        .command-item:hover {
            background: #f0f0f0;
        }

        .command-item.executed {
            border-left-color: #4caf50;
            background: #e8f5e9;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #4caf50;
            display: block;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #f44336;
            display: block;
        }

        .status.info {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #2196f3;
            display: block;
        }

        .icon {
            display: inline-block;
            margin-right: 8px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .input-group {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 22px;
            }
        }

        .copy-feedback {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Git 명령어 실행기</h1>
        <p class="subtitle">TaskFlow 프로젝트를 GitHub에 푸시하세요</p>

        <form id="gitForm">
            <div class="form-group">
                <label for="projectPath">📁 프로젝트 폴더 경로</label>
                <input 
                    type="text" 
                    id="projectPath" 
                    placeholder="예: C:\Users\dlaeh\.gemini\antigravity\scratch\assignment-manager"
                    value="C:\Users\dlaeh\.gemini\antigravity\scratch\assignment-manager"
                    readonly
                >
            </div>

            <div class="form-group">
                <label for="githubId">👤 GitHub 아이디</label>
                <input 
                    type="text" 
                    id="githubId" 
                    placeholder="예: dlaehrbs13-commits"
                    value="dlaehrbs13-commits"
                    required
                >
            </div>

            <div class="form-group">
                <label for="repoName">📦 저장소 이름</label>
                <input 
                    type="text" 
                    id="repoName" 
                    placeholder="예: 2026131609-sw-"
                    value="2026131609-sw-"
                    required
                >
            </div>

            <div class="form-group">
                <label for="commitMessage">💬 커밋 메시지</label>
                <input 
                    type="text" 
                    id="commitMessage" 
                    placeholder="예: feat: TaskFlow 과제 관리 앱 완성"
                    value="feat: TaskFlow 과제 관리 앱 완성"
                    required
                >
            </div>

            <div class="button-group">
                <button type="button" class="btn-execute" onclick="generateCommands()">
                    <span class="icon">⚙️</span> 명령어 생성
                </button>
                <button type="button" class="btn-copy" onclick="copyAllCommands()">
                    <span class="icon">📋</span> 모두 복사
                </button>
            </div>
        </form>

        <div class="commands-display" id="commandsDisplay" style="display: none;">
            <h3>📝 실행할 Git 명령어:</h3>
            <div id="commandsList"></div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <div class="copy-feedback" id="copyFeedback">✓ 복사되었습니다!</div>

    <script>
        const commands = [];

        function generateCommands() {
            const projectPath = document.getElementById('projectPath').value;
            const githubId = document.getElementById('githubId').value;
            const repoName = document.getElementById('repoName').value;
            const commitMessage = document.getElementById('commitMessage').value;

            if (!githubId || !repoName || !commitMessage) {
                showStatus('모든 필드를 입력해주세요!', 'error');
                return;
            }

            commands.length = 0;
            commands.push(`cd "${projectPath}"`);
            commands.push(`git init`);
            commands.push(`git add .`);
            commands.push(`git commit -m "${commitMessage}"`);
            commands.push(`git branch -M main`);
            commands.push(`git remote add origin https://github.com/${githubId}/${repoName}.git`);
            commands.push(`git push -u origin main`);

            displayCommands();
            showStatus(`✓ ${commands.length}개의 명령어가 준비되었습니다!`, 'success');
        }

        function displayCommands() {
            const commandsList = document.getElementById('commandsList');
            const commandsDisplay = document.getElementById('commandsDisplay');
            
            commandsList.innerHTML = '';
            commands.forEach((cmd, index) => {
                const div = document.createElement('div');
                div.className = 'command-item';
                div.textContent = `${index + 1}. ${cmd}`;
                div.onclick = () => copyCommand(cmd);
                commandsList.appendChild(div);
            });

            commandsDisplay.style.display = 'block';
        }

        function copyCommand(cmd) {
            navigator.clipboard.writeText(cmd).then(() => {
                showCopyFeedback();
            });
        }

        function copyAllCommands() {
            if (commands.length === 0) {
                showStatus('먼저 명령어를 생성해주세요!', 'error');
                return;
            }

            const allCommands = commands.join('\n');
            navigator.clipboard.writeText(allCommands).then(() => {
                showCopyFeedback();
            });
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            
            if (type === 'success' || type === 'info') {
                setTimeout(() => {
                    status.className = 'status';
                }, 4000);
            }
        }

        function showCopyFeedback() {
            const feedback = document.getElementById('copyFeedback');
            feedback.style.display = 'block';
            setTimeout(() => {
                feedback.style.display = 'none';
            }, 2000);
        }

        // 페이지 로드 시 자동 생성
        window.addEventListener('load', () => {
            generateCommands();
        });
    </script>
</body>
</html>
