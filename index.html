<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - 과제 관리 앱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 TaskFlow</h1>
            <p class="subtitle">효율적인 과제 관리 앱</p>
        </header>

        <main>
            <div class="input-section">
                <input 
                    type="text" 
                    id="taskInput" 
                    placeholder="새로운 과제를 입력하세요..."
                    class="task-input"
                >
                <button id="addBtn" class="btn-add">추가</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="active">진행중</button>
                <button class="filter-btn" data-filter="completed">완료</button>
            </div>

            <div class="task-list" id="taskList">
                <!-- 과제 항목이 여기에 추가됩니다 -->
            </div>

            <div class="stats">
                <span>전체: <strong id="totalCount">0</strong></span>
                <span>진행중: <strong id="activeCount">0</strong></span>
                <span>완료: <strong id="completedCount">0</strong></span>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 TaskFlow. 과제를 효율적으로 관리하세요!</p>
        </footer>
    </div>

    <script src="app/app.js"></script>
</body>
</html>
